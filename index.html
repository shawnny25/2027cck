<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>2027 사랑의열매 해외지원사업 공모 안내 챗봇</title>
<meta name="description" content="2027 사랑의열매 해외지원사업 신규 공모 안내 챗봇 — 지원자격, 사업기간·예산, 제출 서류, 신청 방법, 심사 기준 등 자주 묻는 질문에 답해드립니다.">
<meta name="robots" content="index,follow">
<meta property="og:type" content="website">
<meta property="og:title" content="2027 사랑의열매 해외지원사업 공모 안내 챗봇">
<meta property="og:description" content="지원자격·예산·제출서류·심사 등 신규 공모 관련 궁금증을 챗봇으로 확인하세요.">
<meta property="og:locale" content="ko_KR">
<meta name="theme-color" content="#e2231a">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%E2%9D%A4%EF%B8%8F%3C/text%3E%3C/svg%3E">
<style>
  :root{
    --red:#e2231a;         /* 사랑의열매 레드 */
    --red-dark:#b81a13;
    --orange:#f7941e;
    --bg:#f4f5f7;
    --card:#ffffff;
    --ink:#1f2328;
    --muted:#6b7280;
    --line:#e5e7eb;
    --bot:#fdf1f0;
    --user:#e7f0ff;
    --user-ink:#0b3d91;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;height:100%;}
  body{
    font-family:"Apple SD Gothic Neo","Malgun Gothic","맑은 고딕",system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
    background:var(--bg);color:var(--ink);
    display:flex;justify-content:center;align-items:stretch;
  }
  .app{
    width:100%;max-width:820px;height:100vh;height:100dvh;display:flex;flex-direction:column;
    background:var(--card);box-shadow:0 0 40px rgba(0,0,0,.06);
  }
  /* Header */
  header{
    background:linear-gradient(135deg,var(--red),var(--orange));
    color:#fff;padding:16px 20px;display:flex;align-items:center;gap:14px;
    flex:0 0 auto;
  }
  .logo{
    width:44px;height:44px;border-radius:50%;background:#fff;flex:0 0 auto;
    display:flex;align-items:center;justify-content:center;font-size:24px;
    box-shadow:0 2px 6px rgba(0,0,0,.15);
  }
  .htxt h1{margin:0;font-size:17px;line-height:1.25;}
  .htxt p{margin:2px 0 0;font-size:12.5px;opacity:.92;}
  /* Chat area */
  .chat{
    flex:1 1 auto;overflow-y:auto;padding:18px 16px 8px;
    background:
      radial-gradient(1200px 400px at 50% -260px, rgba(247,148,30,.08), transparent),
      var(--bg);
  }
  .row{display:flex;margin:10px 0;gap:9px;align-items:flex-end;}
  .row.user{flex-direction:row-reverse;}
  .avatar{
    width:32px;height:32px;border-radius:50%;flex:0 0 auto;
    display:flex;align-items:center;justify-content:center;font-size:16px;
  }
  .avatar.bot{background:var(--red);color:#fff;}
  .avatar.me{background:var(--user-ink);color:#fff;}
  .bubble{
    max-width:76%;padding:12px 14px;border-radius:16px;font-size:14.5px;line-height:1.62;
    white-space:normal;word-break:break-word;box-shadow:0 1px 2px rgba(0,0,0,.05);
  }
  .row.bot .bubble{background:var(--bot);border:1px solid #f6dcd9;border-bottom-left-radius:4px;}
  .row.user .bubble{background:var(--user);color:var(--user-ink);border-bottom-right-radius:4px;}
  .bubble strong{color:var(--red-dark);}
  .row.user .bubble strong{color:var(--user-ink);}
  .bubble ul{margin:7px 0 2px;padding-left:19px;}
  .bubble li{margin:3px 0;}
  .bubble .note{display:block;margin-top:9px;padding-top:8px;border-top:1px dashed #e7c9c5;font-size:12.5px;color:var(--muted);}
  .bubble a{color:var(--red-dark);font-weight:600;}
  .tag{display:inline-block;font-size:11px;font-weight:700;color:var(--red);background:#fff;
       border:1px solid #f2c9c5;border-radius:999px;padding:1px 9px;margin-bottom:6px;}
  /* Suggested chips */
  .suggest{padding:4px 4px 12px;}
  .suggest .lbl{font-size:12px;color:var(--muted);margin:6px 2px;}
  .chips{display:flex;flex-wrap:wrap;gap:7px;}
  .chip{
    border:1px solid var(--line);background:#fff;border-radius:999px;
    padding:7px 12px;font-size:13px;color:#374151;cursor:pointer;transition:.15s;
  }
  .chip:hover{border-color:var(--red);color:var(--red);background:#fff6f5;}
  /* Input */
  .composer{
    flex:0 0 auto;border-top:1px solid var(--line);padding:10px 12px;background:#fff;
    display:flex;gap:9px;align-items:flex-end;
  }
  textarea{
    flex:1 1 auto;resize:none;border:1px solid var(--line);border-radius:14px;
    padding:11px 13px;font:inherit;font-size:14.5px;line-height:1.4;max-height:120px;
    outline:none;
  }
  textarea:focus{border-color:var(--red);box-shadow:0 0 0 3px rgba(226,35,26,.10);}
  .send{
    background:var(--red);color:#fff;border:none;border-radius:14px;
    padding:0 18px;height:44px;font-size:14.5px;font-weight:700;cursor:pointer;flex:0 0 auto;
  }
  .send:hover{background:var(--red-dark);}
  .send:disabled{opacity:.5;cursor:default;}
  .disclaimer{font-size:11px;color:var(--muted);text-align:center;padding:6px 12px 10px;background:#fff;}
  .typing span{display:inline-block;width:6px;height:6px;margin:0 1px;background:var(--red);border-radius:50%;opacity:.4;animation:bl 1s infinite;}
  .typing span:nth-child(2){animation-delay:.2s;}
  .typing span:nth-child(3){animation-delay:.4s;}
  @keyframes bl{0%,80%,100%{opacity:.25;transform:translateY(0);}40%{opacity:1;transform:translateY(-3px);}}
  @media (max-width:520px){
    .bubble{max-width:86%;font-size:14px;}
    header{padding:13px 15px;gap:11px;}
    .logo{width:38px;height:38px;font-size:20px;}
    .htxt h1{font-size:15px;}
    .htxt p{font-size:11.5px;}
    .chat{padding:14px 12px 6px;}
    .send{padding:0 14px;}
  }
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="logo">❤️</div>
    <div class="htxt">
      <h1>2027 사랑의열매 해외지원사업 공모 안내 챗봇</h1>
      <p>신규사업 공모 관련 문의를 도와드립니다 · KCOC 파트너십지원부</p>
    </div>
  </header>

  <div class="chat" id="chat"></div>

  <div class="composer">
    <textarea id="input" rows="1" placeholder="궁금한 점을 입력해 주세요. 예) 우리 단체도 신청할 수 있나요?"></textarea>
    <button class="send" id="send">전송</button>
  </div>
  <div class="disclaimer">
    본 챗봇의 답변은 공모 안내 문서를 기반으로 한 참고용이며, 확정 일정·금액 등은 반드시 해당 연도 공고문과 파트너십지원부(pnd@ngokcoc.or.kr) 안내를 따라 주세요.
  </div>
</div>

<script>
/* ================= 지식베이스 =================
   각 항목: q(대표질문), kw(키워드/동의어), a(답변 HTML), tag(분류)
   ※ 첨부 문서(2026년 공고문·안내서·설명회 자료) + Q1 FAQ 기반.
     연도는 다가오는 신규 공모(2027) 기준으로 안내하되,
     확정 일정·금액은 공고문/문의로 안내. */
const CONTACT = '파트너십지원부(☎ 070-4893-0717 · ✉ <a href="mailto:pnd@ngokcoc.or.kr">pnd@ngokcoc.or.kr</a>)';
const NOTE_CONTACT = '<span class="note">더 자세한 사항이나 개별 상황은 ' + CONTACT + '로 문의해 주세요.</span>';

const KB = [
  /* ---------- 지원 자격 (핵심) ---------- */
  {
    tag:'지원자격',
    q:'우리 단체(기관)도 신청할 수 있나요? / 신청자격이 어떻게 되나요?',
    kw:['신청자격','지원자격','자격','자격요건','자격조건','신청 자격','지원 자격','신청할 수 있','신청 가능','참여 가능','우리 단체','우리 기관','대상','누가 신청','조건','요건'],
    a:'해외지원사업 신청자격은 아래 <strong>4가지 조건을 모두 충족</strong>하는 NGO입니다.'
      +'<ul>'
      +'<li>① 복지·보건의료·교육·고용·주거·문화·(기후)환경·인권 등 다분야에서 개발도상국 사회문제 해결 사업을 <strong>전문적으로 수행할 기반</strong>을 지닌 NGO</li>'
      +'<li>② 대한민국 정부기관·지방자치단체에 등록된 기관으로, <strong>1년 이상 국제개발협력사업 실적</strong>이 있는 NGO</li>'
      +'<li>③ 사업 국가에서 신청기관의 <strong>활동경력 1년 이상</strong>이고, <strong>현지 사무소(현지사업장·파견인력 등) 또는 파트너기관</strong>이 있는 NGO</li>'
      +'<li>④ 사업 국가에서 현지 사업을 수행할 수 있는 <strong>법적요건(현지 NGO 등록 등)</strong>을 갖춘 NGO</li>'
      +'</ul>'
      +'네 가지 중 한 가지만 해당해서는 안 되며, <strong>4가지 요건을 모두 갖추어야</strong> 신청할 수 있습니다.'
      +NOTE_CONTACT
  },
  {
    tag:'지원자격',
    q:'공동모금회 회원 단체가 아니어도 신청할 수 있나요?',
    kw:['회원','회원단체','회원 단체','비회원','회원이 아','가입','멤버'],
    a:'네, 가능합니다. <strong>회원 단체만 신청할 수 있는 것은 아니며</strong>, 회원 단체가 아니어도 신청자격 4가지를 충족하면 신청하실 수 있습니다.'+NOTE_CONTACT
  },
  {
    tag:'지원자격',
    q:'신청자격 4가지 중 한 가지만 해당해도 신청 가능한가요?',
    kw:['한 가지','하나만','한가지','일부만','모두 충족','다 충족','전부','충족'],
    a:'아니요. 해외지원사업의 자격 조건은 현지에 대한 이해와 추진체계를 확인하기 위한 최소한의 기준이므로, <strong>신청자격 4가지를 모두 충족</strong>하셔야 신청이 가능합니다.'+NOTE_CONTACT
  },
  {
    tag:'지원자격',
    q:'반드시 동일법인의 현지 사무소가 있어야 하나요? 현지 단체와 파트너십(컨소시엄)도 되나요?',
    kw:['현지 사무소','현지사무소','동일법인','현지 법인','파견','현지 단체','현지 파트너','파트너기관','파트너십','현지'],
    a:'동일법인의 현지 사무소가 있는 것이 가장 좋지만, 반드시 필수는 아닙니다. 현지 사정에 대한 정보가 충분하고 행정처리가 원활해야 하므로 현지 사무소에 한국인 직원이 파견되어 있는 형태가 권장되나, <strong>현지에서 긴밀히 협력하는 NGO와 파트너십(컨소시엄)을 구성</strong>하여 수행하는 것도 가능합니다.'+NOTE_CONTACT
  },
  {
    tag:'지원자격',
    q:'해당 국가에서 1년 이상 활동경력이 있어야 하는 이유는?',
    kw:['1년 이상','활동경력','활동 경력','경력','왜 1년','일년'],
    a:'해외지원사업은 해당 국가의 정부·유관기관과의 긴밀한 협력을 통해 성과를 달성하고 이를 지속적으로 유지하는 것이 중요합니다. 따라서 <strong>해당 국가에 대한 정보를 충분히 습득하고 활동한 경험</strong>이 필요하여 활동경력 1년 이상을 요건으로 두고 있습니다.'+NOTE_CONTACT
  },
  {
    tag:'지원자격',
    q:'컨소시엄으로 신청할 수 있나요?',
    kw:['컨소시엄','공동','컨소','연합','협업','공동수행'],
    a:'네, 가능합니다. 컨소시엄으로 진행할 경우 <strong>대표 기관을 설정</strong>하셔야 하며, 대표 기관이 전체 사업 예산을 받아 <strong>운영·집행·보고</strong>를 담당합니다. 예산 편성과 운용도 대표기관에서 일괄적으로 진행합니다.'+NOTE_CONTACT
  },
  {
    tag:'지원자격',
    q:'한 기관이 여러 사업을 신청할 수 있나요?',
    kw:['한 개 사업','한개','1개 사업','여러 사업','두 개','2개','복수','몇 개','여러개','한 기관','기관당'],
    a:'아니요. <strong>한 기관당 하나의 사업만</strong> 신청할 수 있습니다. 한 기관이 두 개 이상을 신청하면 신청한 사업이 모두 부적격 처리되므로 유의해 주세요.'+NOTE_CONTACT
  },
  {
    tag:'지원자격',
    q:'이미 모금회 다른 사업(지정기탁 등)을 수행 중인데 신청할 수 있나요?',
    kw:['지정기탁','수행 중','수행중','다른 사업','타 사업','기존 사업','모금회 사업','중복','이미 진행','동시'],
    a:'경우에 따라 다릅니다.'
      +'<ul>'
      +'<li>사회복지공동모금회(중앙회·지회 포함) 또는 타 기관으로부터 <strong>동일하거나 유사한 사업을 지원받는 경우 신청 불가</strong>이며 선정이 취소될 수 있습니다.</li>'
      +'<li>다만 <strong>전혀 다른 사업</strong>(예: 다른 지역·다른 주제)을 지원받는 경우에는 신청 및 선정이 무관합니다.</li>'
      +'<li>단, <strong>사랑의열매 해외지원사업(다년도)으로 수행 중인 동일 사업</strong>은 지원이 불가합니다.</li>'
      +'</ul>'+NOTE_CONTACT
  },
  {
    tag:'지원제외',
    q:'신청(배분대상)에서 제외되는 경우는 무엇인가요?',
    kw:['제외','배분제외','신청 제외','불가한 경우','안 되는','배분대상 제외','부적격','탈락 사유','제한'],
    a:'다음에 해당하면 신청 제외 대상입니다.'
      +'<ul>'
      +'<li>동일한 사업으로 국가·지자체 또는 다른 기관으로부터 지원을 받았거나 받기로 확정된 사업</li>'
      +'<li>법령상 금지된 행위에 사용되는 비용</li>'
      +'<li>정치·종교적 목적에 이용될 수 있는 경우</li>'
      +'<li>영리를 주된 목적으로 하는 사업</li>'
      +'<li>공직선거법에 위반되는 경우</li>'
      +'<li>회계부정 또는 학대·성폭력 등 인권침해로 형사·행정처분을 받고 조치가 종결되지 않은 경우</li>'
      +'<li>신청마감일 기준 모금회 제재조치에 따른 배분대상 제외기간에 신청한 경우</li>'
      +'<li>사랑의열매 해외지원사업(다년도)으로 지속 수행 중인 동일 사업</li>'
      +'</ul>'+NOTE_CONTACT
  },

  /* ---------- 사업 분야 / 대상 ---------- */
  {
    tag:'사업분야',
    q:'지원 가능한 사업 분야(주제)에 제한이 있나요? 인도적 지원·재난 사업도 되나요?',
    kw:['분야','주제','어떤 사업','인도적','재난','난민','기후','환경 사업','제한이 있','종류','영역','어떤 분야'],
    a:'분야나 주제에 별도의 제한을 두고 있지 않습니다. 복지·보건의료·교육·고용·주거·문화·(기후)환경·인권 등 <strong>다분야에서 개발도상국 최취약층의 삶의 질 향상에 기여하는 사업</strong>이면 가능합니다. 실제로 난민 대상 사업, 기후위기 대응 사업 등도 수행되고 있습니다.'
      +'<span class="note">참고로 인도적 지원(식량안보 등) 별도 공모가 있는 경우, 해당 사업과 사랑의열매 해외지원사업은 <strong>중복 신청이 불가</strong>합니다. 자세한 내용은 '+CONTACT+'로 확인해 주세요.</span>'
  },

/* ================= 매칭 엔진 ================= */
function normalize(s){
  return (s||'').toLowerCase().replace(/[\s.,!?~·:;()\[\]"'`]/g,'');
}
function scoreEntry(query, entry){
  const nq = normalize(query);
  let score = 0;
  for(const k of entry.kw){
    const nk = normalize(k);
    if(!nk) continue;
    if(nq.includes(nk)){
      // 긴 키워드일수록 가중치
      score += Math.min(nk.length, 6);
    }
  }
  // 대표질문 자체와의 겹침 보너스
  return score;
}
function findAnswer(query){
  if(!query || !query.trim()) return null;
  let best=null, bestScore=0, second=0;
  for(const e of KB){
    const s = scoreEntry(query, e);
    if(s>bestScore){ second=bestScore; bestScore=s; best=e; }
    else if(s>second){ second=s; }
  }
  // 최소 임계치 미달이면 fallback
  if(bestScore < 2) return null;
  return best;
}
const FALLBACK =

/* ================= UI ================= */
const chat = document.getElementById('chat');
const input = document.getElementById('input');
const sendBtn = document.getElementById('send');

function el(html){const d=document.createElement('div');d.innerHTML=html;return d.firstElementChild;}

function addMsg(who, html){
  const row = document.createElement('div');
  row.className = 'row ' + who;
  const av = document.createElement('div');
  av.className = 'avatar ' + (who==='bot'?'bot':'me');
  av.textContent = who==='bot' ? '❤' : '나';
  const bub = document.createElement('div');
  bub.className = 'bubble';
  bub.innerHTML = html;
  row.appendChild(av); row.appendChild(bub);
  chat.appendChild(row);
  chat.scrollTop = chat.scrollHeight;
  return row;
}

function showTyping(){
  const row = document.createElement('div');
  row.className='row bot'; row.id='typing';
  row.innerHTML='<div class="avatar bot">❤</div><div class="bubble typing"><span></span><span></span><span></span></div>';
  chat.appendChild(row); chat.scrollTop=chat.scrollHeight;
}
function hideTyping(){const t=document.getElementById('typing'); if(t) t.remove();}

function botAnswer(query){
  const entry = findAnswer(query);
  let html;
  if(entry){
    html = (entry.tag? '<span class="tag">'+entry.tag+'</span><br>':'') + entry.a;
  }else{
    html = FALLBACK;
  }
  showTyping();
  setTimeout(()=>{ hideTyping(); addMsg('bot', html); }, 420);
}

function handleSend(){
  const q = input.value.trim();
  if(!q) return;
  addMsg('user', escapeHtml(q));
  input.value=''; autoGrow();
  botAnswer(q);
}
function escapeHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

sendBtn.addEventListener('click', handleSend);
input.addEventListener('keydown', e=>{
  if(e.key==='Enter' && !e.shiftKey){ e.preventDefault(); handleSend(); }
});
function autoGrow(){ input.style.height='auto'; input.style.height=Math.min(input.scrollHeight,120)+'px'; }
input.addEventListener('input', autoGrow);

/* 추천 질문 칩 렌더 */
function renderSuggestions(){
  const wrap = document.createElement('div');
  wrap.className='suggest';
  wrap.innerHTML = '<div class="lbl">💡 이런 질문을 해보세요</div>';
  const chips = document.createElement('div');
  chips.className='chips';
  SUGGESTIONS.forEach(s=>{
    const c=document.createElement('button');
    c.className='chip'; c.textContent=s;
    c.addEventListener('click', ()=>{
      addMsg('user', escapeHtml(s));
      botAnswer(s);
    });
    chips.appendChild(c);
  });
  wrap.appendChild(chips);
  chat.appendChild(wrap);
}
