<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>사랑의열매 해외지원사업 공모 안내 챗봇</title>
<meta name="description" content="사랑의열매 해외지원사업 신규 공모 안내 챗봇 — 지원자격, 사업기간·예산, 제출 서류, 신청 방법, 심사 기준 등 자유롭게 질문해 보세요.">
<meta name="robots" content="index,follow">
<meta property="og:type" content="website">
<meta property="og:title" content="사랑의열매 해외지원사업 공모 안내 챗봇">
<meta property="og:description" content="지원자격·예산·제출서류·심사 등 신규 공모 관련 궁금증을 챗봇으로 확인하세요.">
<meta property="og:locale" content="ko_KR">
<meta name="theme-color" content="#e2231a">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%E2%9D%A4%EF%B8%8F%3C/text%3E%3C/svg%3E">
<style>
  :root{
    --red:#e2231a; --red-dark:#b81a13; --orange:#f7941e;
    --bg:#f4f5f7; --card:#ffffff; --ink:#1f2328; --muted:#6b7280; --line:#e5e7eb;
    --bot:#fdf1f0; --user:#e7f0ff; --user-ink:#0b3d91;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;height:100%;}
  body{
    font-family:"Apple SD Gothic Neo","Malgun Gothic","맑은 고딕",system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
    background:var(--bg);color:var(--ink);
    display:flex;justify-content:center;align-items:stretch;
  }
  .app{
    width:100%;max-width:820px;height:100vh;height:100dvh;display:flex;flex-direction:column;
    background:var(--card);box-shadow:0 0 40px rgba(0,0,0,.06);
  }
  header{
    background:linear-gradient(135deg,var(--red),var(--orange));
    color:#fff;padding:16px 20px;display:flex;align-items:center;gap:14px;flex:0 0 auto;
  }
  .logo{
    width:44px;height:44px;border-radius:50%;background:#fff;flex:0 0 auto;
    display:flex;align-items:center;justify-content:center;font-size:24px;
    box-shadow:0 2px 6px rgba(0,0,0,.15);
  }
  .htxt h1{margin:0;font-size:17px;line-height:1.25;}
  .htxt p{margin:2px 0 0;font-size:12.5px;opacity:.92;}
  .chat{
    flex:1 1 auto;overflow-y:auto;padding:18px 16px 8px;
    background:radial-gradient(1200px 400px at 50% -260px, rgba(247,148,30,.08), transparent), var(--bg);
  }
  .row{display:flex;margin:10px 0;gap:9px;align-items:flex-end;}
  .row.user{flex-direction:row-reverse;}
  .avatar{width:32px;height:32px;border-radius:50%;flex:0 0 auto;display:flex;align-items:center;justify-content:center;font-size:16px;}
  .avatar.bot{background:var(--red);color:#fff;}
  .avatar.me{background:var(--user-ink);color:#fff;}
  .bubble{max-width:76%;padding:12px 14px;border-radius:16px;font-size:14.5px;line-height:1.62;white-space:pre-wrap;word-break:break-word;box-shadow:0 1px 2px rgba(0,0,0,.05);}
  .row.bot .bubble{background:var(--bot);border:1px solid #f6dcd9;border-bottom-left-radius:4px;}
  .row.user .bubble{background:var(--user);color:var(--user-ink);border-bottom-right-radius:4px;}
  .bubble a{color:var(--red-dark);font-weight:600;}
  .bubble.error{background:#fff4f4;border:1px solid #f3c9c9;color:#8a1f1f;}
  .suggest{padding:4px 4px 12px;}
  .suggest .lbl{font-size:12px;color:var(--muted);margin:6px 2px;}
  .chips{display:flex;flex-wrap:wrap;gap:7px;}
  .chip{border:1px solid var(--line);background:#fff;border-radius:999px;padding:7px 12px;font-size:13px;color:#374151;cursor:pointer;transition:.15s;}
  .chip:hover{border-color:var(--red);color:var(--red);background:#fff6f5;}
  .chip:disabled{opacity:.5;cursor:default;}
  .composer{flex:0 0 auto;border-top:1px solid var(--line);padding:10px 12px;background:#fff;display:flex;gap:9px;align-items:flex-end;}
  textarea{flex:1 1 auto;resize:none;border:1px solid var(--line);border-radius:14px;padding:11px 13px;font:inherit;font-size:14.5px;line-height:1.4;max-height:120px;outline:none;}
  textarea:focus{border-color:var(--red);box-shadow:0 0 0 3px rgba(226,35,26,.10);}
  .send{background:var(--red);color:#fff;border:none;border-radius:14px;padding:0 18px;height:44px;font-size:14.5px;font-weight:700;cursor:pointer;flex:0 0 auto;}
  .send:hover{background:var(--red-dark);}
  .send:disabled{opacity:.5;cursor:default;}
  .disclaimer{font-size:11px;color:var(--muted);text-align:center;padding:6px 12px 10px;background:#fff;}
  .typing span{display:inline-block;width:6px;height:6px;margin:0 1px;background:var(--red);border-radius:50%;opacity:.4;animation:bl 1s infinite;}
  .typing span:nth-child(2){animation-delay:.2s;}
  .typing span:nth-child(3){animation-delay:.4s;}
  @keyframes bl{0%,80%,100%{opacity:.25;transform:translateY(0);}40%{opacity:1;transform:translateY(-3px);}}
  @media (max-width:520px){
    .bubble{max-width:86%;font-size:14px;}
    header{padding:13px 15px;gap:11px;}
    .logo{width:38px;height:38px;font-size:20px;}
    .htxt h1{font-size:15px;}
    .htxt p{font-size:11.5px;}
    .chat{padding:14px 12px 6px;}
    .send{padding:0 14px;}
  }
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="logo">❤️</div>
    <div class="htxt">
      <h1>사랑의열매 해외지원사업 공모 안내 챗봇</h1>
      <p>신규사업 공모 관련 문의를 자유롭게 물어보세요 · KCOC 파트너십지원부</p>
    </div>
  </header>

  <div class="chat" id="chat"></div>

  <div class="composer">
    <textarea id="input" rows="1" placeholder="궁금한 점을 자유롭게 입력해 주세요."></textarea>
    <button class="send" id="send">전송</button>
  </div>
  <div class="disclaimer">
    본 챗봇은 AI가 공모 안내 문서를 바탕으로 답변하는 참고용 서비스입니다. 확정 일정·금액 등은 반드시 해당 연도 공고문과 파트너십지원부(pnd@ngokcoc.or.kr) 안내를 따라 주세요.
  </div>
</div>

<script>
/* 답변은 서버리스 함수(/.netlify/functions/chat)를 거쳐 LLM(Gemini)이 생성합니다.
   API 키는 이 파일에 없으며, Netlify 서버 쪽 환경변수에만 보관됩니다. */
const ENDPOINT = '/.netlify/functions/chat';

const SUGGESTIONS = [
  '신청자격이 어떻게 되나요?',
  '회원 단체가 아니어도 신청 가능한가요?',
  '컨소시엄으로 신청할 수 있나요?',
  '신청 제외 대상은 무엇인가요?',
  '사업기간과 지원 금액은?',
  '제출 서류가 뭔가요?',
  '신청 기한(마감일)은 언제인가요?',
  '심사 기준을 알려주세요',
  '최취약층은 어떻게 정의하나요?',
  '문의처 연락처'
];

const chat = document.getElementById('chat');
const input = document.getElementById('input');
const sendBtn = document.getElementById('send');

let history = []; // [{role:'user'|'bot', text:'...'}]
let sending = false;

function addMsg(who, text, opts){
  opts = opts || {};
  const row = document.createElement('div');
  row.className = 'row ' + who;
  const av = document.createElement('div');
  av.className = 'avatar ' + (who==='bot'?'bot':'me');
  av.textContent = who==='bot' ? '❤' : '나';
  const bub = document.createElement('div');
  bub.className = 'bubble' + (opts.error ? ' error' : '');
  bub.textContent = text;
  row.appendChild(av); row.appendChild(bub);
  chat.appendChild(row);
  chat.scrollTop = chat.scrollHeight;
  return row;
}

function showTyping(){
  const row = document.createElement('div');
  row.className='row bot'; row.id='typing';
  row.innerHTML='<div class="avatar bot">❤</div><div class="bubble typing"><span></span><span></span><span></span></div>';
  chat.appendChild(row); chat.scrollTop=chat.scrollHeight;
}
function hideTyping(){ const t=document.getElementById('typing'); if(t) t.remove(); }

function setSending(v){
  sending = v;
  sendBtn.disabled = v;
  document.querySelectorAll('.chip').forEach(c => c.disabled = v);
}

async function askBot(message){
  setSending(true);
  showTyping();
  try{
    const resp = await fetch(ENDPOINT, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message, history })
    });
    const data = await resp.json();
    hideTyping();
    if(!resp.ok || data.error){
      addMsg('bot', (data && data.error) ? data.error : '일시적인 오류가 발생했습니다. 잠시 후 다시 시도해 주세요.', {error:true});
      addMsg('bot', '문의하신 내용은 KCOC 파트너십지원부(pnd@ngokcoc.or.kr / 070-4893-0717)로 직접 연락해 주셔도 됩니다.');
      return;
    }
    addMsg('bot', data.answer);
    history.push({role:'user', text: message});
    history.push({role:'bot', text: data.answer});
  }catch(err){
    hideTyping();
    addMsg('bot', '서버에 연결할 수 없습니다. 잠시 후 다시 시도하시거나, KCOC 파트너십지원부(pnd@ngokcoc.or.kr)로 문의해 주세요.', {error:true});
  }finally{
    setSending(false);
  }
}

function handleSend(){
  if(sending) return;
  const q = input.value.trim();
  if(!q) return;
  addMsg('user', q);
  input.value=''; autoGrow();
  askBot(q);
}

sendBtn.addEventListener('click', handleSend);
input.addEventListener('keydown', e=>{
  if(e.key==='Enter' && !e.shiftKey){ e.preventDefault(); handleSend(); }
});
function autoGrow(){ input.style.height='auto'; input.style.height=Math.min(input.scrollHeight,120)+'px'; }
input.addEventListener('input', autoGrow);

function renderSuggestions(){
  const wrap = document.createElement('div');
  wrap.className='suggest';
  wrap.innerHTML = '<div class="lbl">💡 이런 질문을 해보세요</div>';
  const chips = document.createElement('div');
  chips.className='chips';
  SUGGESTIONS.forEach(s=>{
    const c=document.createElement('button');
    c.className='chip'; c.textContent=s;
    c.addEventListener('click', ()=>{
      if(sending) return;
      addMsg('user', s);
      askBot(s);
    });
    chips.appendChild(c);
  });
  wrap.appendChild(chips);
  chat.appendChild(wrap);
}

addMsg('bot',
  '안녕하세요! 😊 사랑의열매 해외지원사업 신규 공모 안내 챗봇입니다.\n'
  +'지원자격, 사업기간·예산, 제출 서류, 심사 기준 등 궁금한 점을 자유로운 문장으로 편하게 물어봐 주세요. 이전 대화 맥락도 이어서 답변드립니다.'
);
renderSuggestions();
</script>
</body>
</html>
